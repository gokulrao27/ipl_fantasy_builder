name: Daily Deep Research Sync

on:
  schedule:
    - cron: '20 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run deep research sync
        run: npm run deep-research:update

      - name: Validate deep research snapshot
        run: npm run test:deep-research

      - name: Type-check
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/deepResearch.ts
          if git diff --cached --quiet; then
            echo "No updates to commit"
            exit 0
          fi
          git commit -m "chore: daily deep research sync"
          git push
